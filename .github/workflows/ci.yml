name: CI - Test, Build and Push to ECR

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1

jobs:
  test:
    name: Test applications
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test backend Ventas
        working-directory: backend/Springboot-API-REST-VENTAS
        run: chmod +x mvnw && ./mvnw test

      - name: Test backend Despacho
        working-directory: backend/Springboot-API-REST-DESPACHO
        run: chmod +x mvnw && ./mvnw test

      - name: Build frontend
        working-directory: front_despacho
        run: npm ci && npm run build

  publish:
    name: Publish ${{ matrix.component }}
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: frontend
            context: front_despacho
            repository: innovatech-spa-frontend
          - component: backend-ventas
            context: backend/Springboot-API-REST-VENTAS
            repository: innovatech-spa-backend-ventas
          - component: backend-despacho
            context: backend/Springboot-API-REST-DESPACHO
            repository: innovatech-spa-backend-despacho
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ matrix.repository }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$REPOSITORY:latest" "${{ matrix.context }}"
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"
